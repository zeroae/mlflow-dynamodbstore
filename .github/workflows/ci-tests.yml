name: Tests

on:
  push:
    branches: [main, 'release/v*']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, 'release/v*']
    paths: ['src/**', 'tests/**', 'pyproject.toml', 'uv.lock']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.12"]') || fromJSON('["3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run unit tests
        run: uv run pytest tests/unit/ -m unit --cov=mlflow_dynamodbstore --cov-report=xml -v

  integration:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run integration tests
        run: uv run pytest tests/integration/ -m integration --cov=mlflow_dynamodbstore --cov-report=xml -v

  compatibility:
    needs: unit
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run compatibility tests
        run: uv run pytest tests/compatibility/ -m compatibility -v
