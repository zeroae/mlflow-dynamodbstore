name: Tests

on:
  push:
    branches: [main, 'release/v*', 'release/[0-9]*']
    # No paths filter - run on all pushes to ensure workflow_run always triggers
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, 'release/v*', 'release/[0-9]*']
    paths: ['src/**', 'tests/**', 'vendor/**', 'pyproject.toml', 'uv.lock']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.12"]') || fromJSON('["3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run unit tests
        run: uv run pytest tests/unit/ -m unit -n auto --cov=mlflow_dynamodbstore --cov-report=xml --junitxml=junit.xml -o junit_family=legacy -v
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: "!cancelled() && matrix.python-version == '3.12'"
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run integration tests
        run: uv run pytest tests/integration/ -m integration --cov=mlflow_dynamodbstore --cov-report=xml --junitxml=junit.xml -o junit_family=legacy -v
      - name: Upload integration coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload integration test results to Codecov
        if: "!cancelled()"
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run e2e tests (moto backend)
        run: uv run pytest tests/e2e/ -m e2e --cov=mlflow_dynamodbstore --cov-report=xml --junitxml=junit.xml -o junit_family=legacy -v
      - name: Upload e2e coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload e2e test results to Codecov
        if: "!cancelled()"
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          fail_ci_if_error: false

  compatibility:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run compatibility tests
        run: uv run pytest tests/compatibility/ -m compatibility -n auto --junitxml=junit.xml -o junit_family=legacy -v
      - name: Upload compatibility test results to Codecov
        if: "!cancelled()"
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          flags: compatibility
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          fail_ci_if_error: false

